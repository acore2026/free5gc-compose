info:
  version: 1.0.7
  description: SMF initial local configuration

configuration:
  smfName: SMF
  sbi:
    scheme: http
    registerIPv4: smf.free5gc.org
    bindingIPv4: smf.free5gc.org
    port: 8000
    tls:
      key: cert/smf.key
      pem: cert/smf.pem
  serviceNameList:
    - nsmf-pdusession
    - nsmf-event-exposure
    - nsmf-oam
  snssaiInfos:
    - sNssai:
        sst: 1
        sd: 000000
      dnnInfos:
        - dnn: internet
          dns:
            ipv4: 8.8.8.8
            ipv6: 2001:4860:4860::8888
    - sNssai:
        sst: 1
        sd: 112233
      dnnInfos:
        - dnn: internet
          dns:
            ipv4: 8.8.8.8
            ipv6: 2001:4860:4860::8888
  plmnList:
    - mcc: 460
      mnc: 11
  locality: area1
  pfcp:
    nodeID: smf.free5gc.org
    listenAddr: smf.free5gc.org
    externalAddr: smf.free5gc.org
  userplaneInformation:
    upNodes:
      gNB1:
        type: AN
      UPF:
        type: UPF
        nodeID: upf.free5gc.org
        addr: upf.free5gc.org
        sNssaiUpfInfos:
          - sNssai:
              sst: 1
              sd: 000000
            dnnUpfInfoList:
              - dnn: internet
                pools:
                  - cidr: 10.60.0.0/16
                staticIpPool:
                  - cidr: 10.60.0.0/24
          - sNssai:
              sst: 1
              sd: 112233
            dnnUpfInfoList:
              - dnn: internet
                pools:
                  - cidr: 10.61.0.0/16
        interfaces:
          - interfaceType: N3
            endpoints:
              - 10.88.120.100
            networkInstances:
              - internet
    links:
      - A: gNB1
        B: UPF
  t3591:
    enable: true
    expireTime: 16s
    maxRetryTimes: 3
  t3592:
    enable: true
    expireTime: 16s
    maxRetryTimes: 3
  nrfUri: http://nrf.free5gc.org:8000
  nrfCertPem: cert/nrf.pem
  urrPeriod: 10
  urrThreshold: 1000
  requestedUnit: 1000
  metrics:
    enable: false
    scheme: http
    bindingIPv4: smf.free5gc.org
    port: 9091
    tls:
      pem: cert/smf.pem
      key: cert/smf.key
    namespace: free5gc

logger:
  enable: true
  level: info
  reportCaller: false
