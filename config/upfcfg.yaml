version: 1.0.3
description: UPF userspace-forwarder configuration

nrfUri: http://nrf.free5gc.org:8000

pfcp:
  addr: upf.free5gc.org
  nodeID: upf.free5gc.org
  retransTimeout: 1s
  maxRetrans: 3

sbi:
  scheme: http
  registerIPv4: upf.free5gc.org
  bindingIPv4: upf.free5gc.org
  port: 8000

gtpu:
  forwarder: userspace
  ifList:
    - addr: 0.0.0.0
      type: N3
  userspace:
    workers: 4
    queueSize: 1024
    tunName: upfusr0
    tunMtu: 1400
  adaptiveQos:
    enable: true
    masqueBindAddress: upf.free5gc.org
    masquePort: 4433
    reportBindAddress: 127.0.0.1
    reportPort: 7777
    debugBindAddress: 0.0.0.0
    debugPort: 9082
    tls:
      pem: /free5gc/config/adaptive-upf.pem
      key: /free5gc/config/adaptive-upf.key

dnnList:
  - dnn: internet
    cidr: 10.60.0.0/16
    natifname: eth0
  - dnn: internet
    cidr: 10.61.0.0/16
    natifname: eth0
  - dnn: IMS
    cidr: 10.62.0.0/16
    natifname: eth0
  - dnn: IMS
    cidr: 10.63.0.0/16
    natifname: eth0

logger:
  enable: true
  level: info
  reportCaller: false
