version: 1.0.3
description: Generic UPF 3 configuration

nrfUri: http://nrf.free5gc.org:8000

pfcp:
  addr: upf3.free5gc.org
  nodeID: upf3.free5gc.org
  retransTimeout: 1s
  maxRetrans: 3

sbi:
  scheme: http
  registerIPv4: upf3.free5gc.org
  bindingIPv4: upf3.free5gc.org
  port: 8000

gtpu:
  forwarder: userspace
  ifList:
    - addr: upf3.free5gc.org
      type: N3
  userspace:
    workers: 4
    queueSize: 1024
    tunName: upfusr3
    tunMtu: 1400

dnnList:
  - dnn: internet
    cidr: 10.62.0.0/16
    natifname: eth0

logger:
  enable: true
  level: debug
  reportCaller: false
