version: 1.0.3
description: UPF userspace-forwarder adaptive QoS configuration

nrfUri: http://nrf.free5gc.org:8000

pfcp:
  addr: upf.free5gc.org
  nodeID: upf.free5gc.org
  retransTimeout: 1s
  maxRetrans: 3

sbi:
  scheme: http
  registerIPv4: upf.free5gc.org
  bindingIPv4: upf.free5gc.org
  port: 8000

gtpu:
  forwarder: userspace
  ifList:
    - addr: upf.free5gc.org
      type: N3
  userspace:
    workers: 4
    queueSize: 1024
    tunName: upfusr0
    tunMtu: 1400
  adaptiveQos:
    enable: true
    masqueBindAddress: upf
    masquePort: 4433
    reportBindAddress: 127.0.0.1
    reportPort: 7777
    debugBindAddress: 0.0.0.0
    debugPort: 9082
    tls:
      pem: /free5gc/config/adaptive-upf.pem
      key: /free5gc/config/adaptive-upf.key
    gnbControl:
      addr: 127.0.0.1
      port: 2152
    authorization:
      defaultProfileDuration: 30s
      maxBitrateUl: 2000000
      maxBitrateDl: 2000000
      maxGfbrUl: 1000000
      maxGfbrDl: 1000000
    rules:
      - name: low-latency-periodic
        trafficPattern: periodic
        latencySensitivity: high
        target5qi: 7
        targetArp: 8
        overrideGateUl: true
        overrideGateDl: true
        overrideMbrUl: 256000
        overrideMbrDl: 256000
        duration: 45s
      - name: uplink-video-boost
        bitrateChangeDirection: up
        target5qi: 8
        targetArp: 8
        overrideMbrUl: 1200000
        overrideMbrDl: 1200000
        duration: 60s

dnnList:
  - dnn: internet
    cidr: 10.60.0.0/16
    natifname: eth0
  - dnn: internet
    cidr: 10.61.0.0/16
    natifname: eth0

logger:
  enable: true
  level: debug
  reportCaller: false
